<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@700&display=swap" rel="stylesheet">
</head>
<body style="background: #ccc; display: flex; justify-content: center; align-items: center; height: 100vh;">

  <div style="position: relative; width: 96px; height: 96px; background: white; border-radius: 50%;">
    <img src="https://placehold.co/96x96" style="border-radius: 50%;">
    
    <div style="position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 80px; height: 40px; z-index: 10;">
      <svg viewBox="0 0 100 40" style="width: 100%; height: 100%; overflow: visible; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
        <path 
          d="M 10,15 Q 50,-5 90,15 A 10,10 0 0,1 90,35 Q 50,15 10,35 A 10,10 0 0,1 10,15 Z" 
          fill="#E32731" 
        />
        <defs>
          <path id="tp" d="M 10,27 Q 50,7 90,27" />
        </defs>
        <text fill="white" font-size="18" font-weight="900" font-family="'Balsamiq Sans', cursive">
          <textPath href="#tp" startOffset="50%" text-anchor="middle" dominant-baseline="middle">
            24% off
          </textPath>
        </text>
      </svg>
    </div>

  </div>

</body>
</html>
